<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oglas — Nomads Croatia</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="" defer></script>
<link rel="preload" href="/fonts/jost-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/cormorant-normal-latin.woff2" as="font" type="font/woff2" crossorigin>
<style>
@font-face{font-family:'Jost';font-style:normal;font-weight:200 600;font-display:swap;src:url('/fonts/jost-latin-ext.woff2') format('woff2');unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;}
@font-face{font-family:'Jost';font-style:normal;font-weight:200 600;font-display:swap;src:url('/fonts/jost-latin.woff2') format('woff2');}
@font-face{font-family:'Cormorant Garamond';font-style:normal;font-weight:300 500;font-display:swap;src:url('/fonts/cormorant-normal-latin-ext.woff2') format('woff2');unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;}
@font-face{font-family:'Cormorant Garamond';font-style:normal;font-weight:300 500;font-display:swap;src:url('/fonts/cormorant-normal-latin.woff2') format('woff2');}
@font-face{font-family:'Cormorant Garamond';font-style:italic;font-weight:300 400;font-display:swap;src:url('/fonts/cormorant-italic-latin.woff2') format('woff2');}
</style>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#1C3026;--teal:#2A6049;--teal-mid:#357A5C;--teal-pale:#DFF0E8;
  --accent:#F59E0B;--accent-pale:#FEF3C7;
  --white:#fff;--off:#F8FBF9;--cream:#F3F7F4;--border:#D8E8DD;
  --text:#0D1E28;--text-light:#3E5F4C;--text-muted:#6D9B7E;
  --green:#16A34A;--green-pale:#DCFCE7;--red:#EF4444;--red-pale:#FEF2F2;
  --shadow:0 2px 12px rgba(28,48,38,0.07);--shadow-md:0 6px 28px rgba(28,48,38,0.11);--shadow-lg:0 16px 56px rgba(28,48,38,0.15);
}
html{scroll-behavior:smooth;}
body{font-family:'Jost',sans-serif;background:#fff;color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{max-width:100%;height:auto;display:block;}a{text-decoration:none;color:inherit;}button{cursor:pointer;font-family:'Jost',sans-serif;}

/* NAV */
.nav{position:sticky;top:0;z-index:200;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:#fff;border-bottom:1px solid var(--border);box-shadow:var(--shadow);}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.nav-logo-icon{width:32px;height:32px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.nav-logo-icon svg{width:17px;height:17px;fill:#fff;}
.nav-logo-text{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--navy);}
.nav-back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-light);transition:color 0.2s;}
.nav-back:hover{color:var(--navy);}
.nav-back svg{width:16px;height:16px;fill:currentColor;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-share{padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;color:var(--text);background:#fff;transition:all 0.2s;}
.nav-share:hover{border-color:var(--teal);color:var(--teal);}
.nav-save{padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;color:var(--text);background:#fff;transition:all 0.2s;display:flex;align-items:center;gap:5px;}
.nav-save:hover{border-color:var(--red);color:var(--red);}
.nav-save svg{width:14px;height:14px;fill:currentColor;}

/* GALLERY */
.gallery{position:relative;height:480px;overflow:hidden;}
.gallery-main{width:100%;height:100%;object-fit:cover;cursor:zoom-in;}
.gallery-grid{display:grid;grid-template-columns:1fr 320px;grid-template-rows:1fr 1fr;gap:4px;height:100%;}
.gallery-grid .g0{grid-row:span 2;overflow:hidden;}
.gallery-grid .g0 img{width:100%;height:100%;object-fit:cover;cursor:pointer;transition:transform 0.3s;}
.gallery-grid .g0:hover img{transform:scale(1.03);}
.gallery-thumb{overflow:hidden;position:relative;}
.gallery-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer;transition:transform 0.3s;}
.gallery-thumb:hover img{transform:scale(1.05);}
.gallery-thumb.last::after{content:attr(data-more);position:absolute;inset:0;background:rgba(28,48,38,0.6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:600;cursor:pointer;}
.gallery-badge{position:absolute;bottom:16px;left:16px;z-index:10;display:flex;gap:8px;}
.gbadge{padding:5px 12px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;backdrop-filter:blur(8px);}
.gbadge-type{background:rgba(28,48,38,0.85);color:#fff;}
.gbadge-wifi.fast{background:rgba(22,163,74,0.9);color:#fff;}
.gbadge-wifi.mid{background:rgba(245,158,11,0.9);color:#fff;}
.gbadge-wifi.slow{background:rgba(239,68,68,0.9);color:#fff;}
.gallery-all-btn{position:absolute;bottom:16px;right:16px;z-index:10;padding:8px 16px;background:rgba(255,255,255,0.92);border:none;border-radius:8px;font-size:11px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:6px;transition:all 0.2s;backdrop-filter:blur(4px);}
.gallery-all-btn:hover{background:#fff;box-shadow:var(--shadow-md);}
.gallery-all-btn svg{width:14px;height:14px;fill:var(--navy);}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox-close{position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:10;}
.lightbox-img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:4px;}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.12);border:none;color:#fff;width:48px;height:48px;border-radius:50%;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.2s;}
.lightbox-nav:hover{background:rgba(255,255,255,0.25);}
.lightbox-prev{left:20px;}
.lightbox-next{right:20px;}
.lightbox-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.6);font-size:13px;}

/* LAYOUT */
.page-inner{max-width:1200px;margin:0 auto;padding:40px 32px 80px;display:grid;grid-template-columns:1fr 380px;gap:48px;align-items:start;}
.main-col{}
.side-col{position:sticky;top:80px;}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);margin-bottom:20px;}
.breadcrumb a{color:var(--text-muted);transition:color 0.2s;}
.breadcrumb a:hover{color:var(--teal);}
.breadcrumb svg{width:12px;height:12px;fill:var(--text-muted);}

/* TITLE BLOCK */
.title-block{margin-bottom:28px;}
.title-block-loc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);margin-bottom:8px;}
.title-block-loc svg{width:13px;height:13px;fill:var(--text-muted);}
.title-main{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3.5vw,40px);font-weight:400;color:var(--navy);line-height:1.2;margin-bottom:14px;}
.title-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.tbadge{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:8px;font-size:11px;font-weight:600;}
.tbadge-wifi{background:var(--green-pale);color:var(--green);}
.tbadge-wifi.mid{background:var(--accent-pale);color:#92400E;}
.tbadge-wifi.slow{background:var(--red-pale);color:var(--red);}
.tbadge-wifi svg,.tbadge svg{width:14px;height:14px;fill:currentColor;}
.tbadge-type{background:var(--teal-pale);color:var(--teal);}
.tbadge-min{background:var(--cream);color:var(--text-light);border:1px solid var(--border);}
.title-meta{display:flex;gap:20px;flex-wrap:wrap;}
.title-meta-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-light);}
.title-meta-item svg{width:15px;height:15px;fill:var(--text-muted);}

/* SECTION DIVIDER */
.sec-div{height:1px;background:var(--border);margin:28px 0;}

/* SECTION TITLE */
.sec-label{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;}
.sec-heading{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--navy);margin-bottom:16px;}

/* DESCRIPTION */
.description{font-size:14px;color:var(--text-light);line-height:1.75;}
.description.collapsed{max-height:120px;overflow:hidden;position:relative;}
.description.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,#fff);}
.show-more-btn{margin-top:12px;font-size:13px;font-weight:600;color:var(--teal);background:none;border:none;padding:0;display:flex;align-items:center;gap:4px;}
.show-more-btn svg{width:14px;height:14px;fill:var(--teal);transition:transform 0.2s;}
.show-more-btn.open svg{transform:rotate(180deg);}

/* AMENITIES */
.amenities-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.amenity{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--border);border-radius:10px;}
.amenity-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center;}
.amenity-label{font-size:12px;color:var(--text-light);font-weight:500;}

/* WIFI DETAIL */
.wifi-detail{background:linear-gradient(135deg,var(--navy),#1E4030);border-radius:14px;padding:22px;color:#fff;margin-bottom:0;}
.wifi-detail-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.wifi-detail-title{font-size:13px;font-weight:600;letter-spacing:0.05em;}
.wifi-speed-big{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:400;color:#fff;line-height:1;}
.wifi-unit{font-size:13px;color:rgba(255,255,255,0.5);margin-left:6px;}
.wifi-bars{display:flex;gap:4px;align-items:flex-end;margin-bottom:14px;}
.wifi-bar{border-radius:3px 3px 0 0;background:rgba(255,255,255,0.15);}
.wifi-bar.active.fast{background:#22C55E;}
.wifi-bar.active.mid{background:#F59E0B;}
.wifi-bar.active.slow{background:#EF4444;}
.wifi-detail-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.wifi-stat{background:rgba(255,255,255,0.07);border-radius:8px;padding:10px 12px;}
.wifi-stat-lbl{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;}
.wifi-stat-val{font-size:16px;font-weight:600;color:#fff;}
.wifi-stat-val small{font-size:11px;font-weight:400;color:rgba(255,255,255,0.5);}
.wifi-provider{font-size:11px;color:rgba(255,255,255,0.4);margin-top:10px;}

/* COLIVING ROOMS */
.rooms-section{margin-top:0;}
.rooms-tabs{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;}
.room-tab{flex-shrink:0;padding:9px 18px;border:1.5px solid var(--border);border-radius:10px;font-size:12px;font-weight:600;background:#fff;color:var(--text-light);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.room-tab:hover{border-color:var(--teal);color:var(--teal);}
.room-tab.active{background:var(--teal);color:#fff;border-color:var(--teal);}
.room-tab.avail{position:relative;}
.room-tab.avail::after{content:'';position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:#22C55E;border:1.5px solid #fff;}
.room-panel{display:none;}
.room-panel.active{display:block;}

/* ROOM GALLERY */
.room-gallery{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:4px;margin-bottom:18px;-webkit-overflow-scrolling:touch;}
.room-gallery::-webkit-scrollbar{height:3px;}
.room-gallery::-webkit-scrollbar-track{background:var(--border);}
.room-gallery::-webkit-scrollbar-thumb{background:var(--teal-pale2);border-radius:10px;}
.rg-img{flex-shrink:0;width:280px;height:200px;border-radius:12px;overflow:hidden;scroll-snap-align:start;cursor:pointer;}
.rg-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s;}
.rg-img:hover img{transform:scale(1.04);}

/* ROOM INFO */
.room-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.room-stat{background:var(--cream);border-radius:10px;padding:13px 16px;}
.room-stat-lbl{font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px;}
.room-stat-val{font-size:17px;font-weight:600;color:var(--navy);}
.room-stat-val small{font-size:11px;font-weight:400;color:var(--text-muted);}
.room-desc{font-size:13px;color:var(--text-light);line-height:1.7;}
.room-amenities{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.ramtag{padding:5px 10px;background:var(--teal-pale);color:var(--teal);border-radius:6px;font-size:11px;font-weight:600;}

/* CALENDAR */
.cal-wrap{background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;}
.cal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cal-nav-btns{display:flex;align-items:center;gap:10px;}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--navy);transition:all 0.15s;}
.cal-nav-btn:hover{border-color:var(--teal);color:var(--teal);}
.cal-month-label{font-size:15px;font-weight:600;color:var(--navy);min-width:150px;text-align:center;}
.cal-legend{display:flex;gap:14px;font-size:11px;color:var(--text-muted);}
.cal-leg-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px;}
.cal-grid-wrap{padding:14px 16px;}
.cal-days-head{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
.cal-day-lbl{text-align:center;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);padding:4px 0;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1.5px solid transparent;color:var(--text);}
.cal-day.empty{cursor:default;}
.cal-day.past{opacity:0.3;cursor:not-allowed;}
.cal-day.booked{background:#FEE2E2;color:#B91C1C;cursor:not-allowed;text-decoration:line-through;}
.cal-day.available:hover{background:var(--teal-pale);border-color:var(--teal);}
.cal-day.selected{background:var(--navy)!important;color:#fff!important;border-color:var(--navy)!important;}
.cal-day.in-range{background:var(--teal-pale);border-color:transparent;}
.cal-day.start-range{background:var(--navy);color:#fff;border-radius:8px 0 0 8px;}
.cal-day.end-range{background:var(--navy);color:#fff;border-radius:0 8px 8px 0;}
.cal-day.today{border-color:var(--accent);}

/* BOOKING CARD */
.booking-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:22px;box-shadow:var(--shadow-md);}
.booking-price-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;}
.booking-price-week{font-size:28px;font-weight:700;color:var(--navy);}
.booking-price-per{font-size:13px;color:var(--text-muted);margin-left:5px;}
.booking-price-month{font-size:14px;color:var(--text-light);}
.booking-tabs{display:flex;gap:4px;margin-bottom:18px;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;}
.booking-tab{flex:1;padding:9px;font-size:12px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;border:none;background:#fff;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.booking-tab.active{background:var(--navy);color:#fff;}
.booking-field{margin-bottom:14px;}
.booking-field label{display:block;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.booking-input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;font-family:'Jost',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border 0.2s;}
.booking-input:focus{border-color:var(--teal);}
.booking-summary{background:var(--cream);border-radius:10px;padding:14px;margin-bottom:16px;}
.booking-summary-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text-light);margin-bottom:6px;}
.booking-summary-row:last-child{margin-bottom:0;padding-top:8px;border-top:1px solid var(--border);font-weight:600;color:var(--navy);}
.booking-btn{width:100%;padding:14px;background:var(--teal);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;transition:background 0.2s;margin-bottom:10px;}
.booking-btn:hover{background:var(--navy);}
.booking-note{font-size:11px;color:var(--text-muted);text-align:center;line-height:1.5;}
.booking-host{display:flex;align-items:center;gap:13px;padding-top:18px;border-top:1px solid var(--border);margin-top:18px;}
.booking-host-av{width:44px;height:44px;border-radius:50%;object-fit:cover;}
.booking-host-name{font-size:14px;font-weight:600;color:var(--navy);}
.booking-host-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
.booking-host-badge{font-size:10px;font-weight:700;color:var(--green);background:var(--green-pale);padding:2px 8px;border-radius:10px;display:inline-block;margin-top:3px;}
.booking-contact-btn{margin-left:auto;padding:8px 14px;background:var(--cream);border:1.5px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;color:var(--text);cursor:pointer;transition:all 0.2s;}
.booking-contact-btn:hover{border-color:var(--teal);color:var(--teal);}

/* MAP SECTION */
.map-section{border-radius:14px;overflow:hidden;height:280px;border:1px solid var(--border);}
#detailMap{width:100%;height:100%;}

/* HOST SECTION */
.host-section{display:flex;gap:18px;align-items:flex-start;}
.host-av-lg{width:70px;height:70px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.host-info{flex:1;}
.host-name{font-size:18px;font-weight:600;color:var(--navy);margin-bottom:3px;}
.host-meta{font-size:12px;color:var(--text-muted);}
.host-badges{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;}
.hbadge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;background:var(--green-pale);color:var(--green);}
.hbadge.id{background:var(--teal-pale);color:var(--teal);}
.host-bio{font-size:13px;color:var(--text-light);line-height:1.7;margin-top:12px;}
.host-actions{display:flex;gap:10px;margin-top:14px;}
.host-btn{padding:10px 20px;border-radius:9px;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;border:none;}
.host-btn-primary{background:var(--teal);color:#fff;}
.host-btn-primary:hover{background:var(--navy);}
.host-btn-secondary{background:#fff;color:var(--text);border:1.5px solid var(--border);}
.host-btn-secondary:hover{border-color:var(--teal);color:var(--teal);}

/* CONTACT MODAL */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:20px;padding:36px;width:100%;max-width:480px;position:relative;}
.modal-close{position:absolute;top:18px;right:22px;background:none;border:none;font-size:22px;color:var(--text-muted);cursor:pointer;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--navy);margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;}
.mf{margin-bottom:14px;}
.mf label{display:block;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px;}
.mf input,.mf textarea,.mf select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-family:'Jost',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border 0.2s;}
.mf input:focus,.mf textarea:focus,.mf select:focus{border-color:var(--teal);}
.mf textarea{min-height:100px;resize:vertical;line-height:1.6;}
.modal-btn{width:100%;padding:13px;background:var(--navy);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;margin-top:4px;}
.modal-btn:hover{background:var(--teal);}
.modal-success{text-align:center;padding:20px 0;}
.modal-success svg{width:52px;height:52px;fill:var(--green);margin:0 auto 16px;}
.modal-success h3{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--navy);margin-bottom:8px;}
.modal-success p{font-size:13px;color:var(--text-muted);}

/* MOBILE BOOKING BAR */
.mobile-booking-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid var(--border);padding:12px 20px;box-shadow:0 -4px 20px rgba(28,48,38,0.1);}
.mbb-inner{display:flex;align-items:center;gap:14px;}
.mbb-price{font-size:20px;font-weight:700;color:var(--navy);}
.mbb-per{font-size:12px;color:var(--text-muted);}
.mbb-btn{flex:1;padding:12px;background:var(--teal);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;}

@media(max-width:960px){
  .page-inner{grid-template-columns:1fr;gap:32px;}
  .side-col{position:static;}
  .nav{padding:0 16px;}
  .gallery{height:300px;}
  .gallery-grid{grid-template-columns:1fr 180px;}
  .amenities-grid{grid-template-columns:1fr 1fr;}
  .mobile-booking-bar{display:block;}
  .booking-card{display:none;}
}
@media(max-width:600px){
  .gallery-grid{display:block;}
  .gallery-grid .g0{height:260px;}
  .gallery-grid .g1,.gallery-grid .g2{display:none;}
  .gallery-badge{bottom:10px;left:10px;}
  .page-inner{padding:20px 16px 100px;}
  .amenities-grid{grid-template-columns:1fr;}
  .room-info-grid{grid-template-columns:1fr;}
}
</style>

// CALENDAR
function renderCalendar(){
  const months = ['Siječanj','Veljača','Ožujak','Travanj','Svibanj','Lipanj','Srpanj','Kolovoz','Rujan','Listopad','Studeni','Prosinac'];
  document.getElementById('calMonthLabel').textContent = `${months[calMonth]} ${calYear}`;
  const days = document.getElementById('calDays');
  days.innerHTML = '';
  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1);
  let startDow = firstDay.getDay(); if(startDow===0) startDow=7;
  const totalDays = new Date(calYear, calMonth+1, 0).getDate();
  for(let i=1;i<startDow;i++) days.innerHTML += `<div class="cal-day empty"></div>`;
  for(let d=1;d<=totalDays;d++){
    const date = new Date(calYear, calMonth, d);
    const isPast = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const isBooked = listing.bookedDays.includes(d) && calMonth === new Date().getMonth();
    const isToday = d===today.getDate() && calMonth===today.getMonth() && calYear===today.getFullYear();
    let cls = 'cal-day ';
    if(isPast) cls += 'past';
    else if(isBooked) cls += 'booked';
    else cls += 'available';
    if(isToday) cls += ' today';
    if(calStart && calStart.d===d && calStart.m===calMonth && calStart.y===calYear) cls += ' selected start-range';
    if(calEnd && calEnd.d===d && calEnd.m===calMonth && calEnd.y===calYear) cls += ' selected end-range';
    if(calStart && calEnd){
      const ts = new Date(calStart.y,calStart.m,calStart.d).getTime();
      const te = new Date(calEnd.y,calEnd.m,calEnd.d).getTime();
      const td = date.getTime();
      if(td>ts && td<te) cls += ' in-range';
    }
    days.innerHTML += `<div class="${cls}" onclick="calDayClick(${d},${calMonth},${calYear},${isPast||isBooked})">${d}</div>`;
  }
}

function calNav(dir){
  calMonth += dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function calDayClick(d,m,y,disabled){
  if(disabled) return;
  if(!calStart || (calStart && calEnd)){
    calStart = {d,m,y}; calEnd = null;
    document.getElementById('calClearBtn').style.display='inline';
    document.getElementById('calSelection').textContent = `Dolazak: ${d}.${m+1}.${y}`;
  } else {
    const ts = new Date(calStart.y,calStart.m,calStart.d).getTime();
    const te = new Date(y,m,d).getTime();
    if(te<=ts){ calStart={d,m,y}; document.getElementById('calSelection').textContent=`Dolazak: ${d}.${m+1}.${y}`; }
    else {
      calEnd = {d,m,y};
      const nights = Math.round((te-ts)/(1000*60*60*24));
      const weeks = Math.floor(nights/7);
      document.getElementById('calSelection').textContent = `${calStart.d}.${calStart.m+1} – ${d}.${m+1}.${y} · ${nights} noć${nights===1?'':'i'} (${weeks} tjed${weeks===1?'an':'ana'})`;
    }
  }
  renderCalendar();
}

function clearCalendar(){
  calStart=null; calEnd=null;
  document.getElementById('calClearBtn').style.display='none';
  document.getElementById('calSelection').textContent='Odaberite datum dolaska';
  renderCalendar();
}

let bookingMode = 'weekly';
function switchBookingTab(mode, btn){
  bookingMode = mode;
  document.querySelectorAll('.booking-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const durSel = document.getElementById('bDuration');
  if(mode==='weekly'){
    durSel.innerHTML = `<option value="1">1 tjedan</option><option value="2">2 tjedna</option><option value="3">3 tjedna</option>`;
  } else {
    durSel.innerHTML = `<option value="4">1 mjesec</option><option value="8">2 mjeseca</option><option value="12">3 mjeseca</option><option value="24">6 mjeseci</option>`;
  }
  updateBookingSummary();
}

function updateBookingSummary(){
  const dur = parseInt(document.getElementById('bDuration').value)||1;
  const pricePerWeek = listing.weekPrice;
  const total = dur * pricePerWeek;
  const weeks = dur;
  const months = Math.floor(weeks/4);
  document.getElementById('bookingSummary').innerHTML = `
    <div class="booking-summary-row"><span>${weeks} tjed. × €${pricePerWeek}</span><span>€${total}</span></div>
    ${months>=1&&weeks%4===0?`<div class="booking-summary-row"><span>Popust za ${months} mj.</span><span style="color:var(--green);">-€${Math.round(total*0.05)}</span></div>`:''}
    <div class="booking-summary-row"><span>Ukupno (bez provizije)</span><span>€${months>=1&&weeks%4===0?total-Math.round(total*0.05):total}</span></div>`;
}

function initMap(){
  if(typeof L==='undefined') return;
  const map = L.map('detailMap',{zoomControl:true,scrollWheelZoom:false}).setView([listing.lat,listing.lng],14);

  L.circle([listing.lat,listing.lng],{color:'#2A6049',fillColor:'#DFF0E8',fillOpacity:0.5,radius:300}).addTo(map);
  L.marker([listing.lat,listing.lng],{
    icon:L.divIcon({className:'',html:'<div style="background:#1C3026;color:#fff;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.3);">📍 '+listing.city+'</div>',iconAnchor:[40,10]})
  }).addTo(map);
}
