<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#1C3026;--teal:#2A6049;--teal-mid:#357A5C;--teal-pale:#DFF0E8;--teal-pale2:#BDD8CA;
  --accent:#F59E0B;--accent-pale:#FEF3C7;
  --white:#fff;--off:#F8FBF9;--cream:#F3F7F4;--border:#D8E8DD;
  --text:#0D1E28;--text-light:#3E5F4C;--text-muted:#6D9B7E;
  --green:#16A34A;--green-pale:#DCFCE7;
  --shadow:0 2px 12px rgba(28,48,38,0.07);--shadow-md:0 6px 28px rgba(28,48,38,0.11);
}
html,body{height:100%;font-family:'Jost',sans-serif;background:#fff;color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{max-width:100%;height:auto;display:block;}a{text-decoration:none;color:inherit;}button{cursor:pointer;font-family:'Jost',sans-serif;}

/* NAV */
.nav{position:sticky;top:0;z-index:200;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:#fff;border-bottom:1px solid var(--border);box-shadow:var(--shadow);}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.nav-logo-icon{width:32px;height:32px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.nav-logo-icon svg{width:17px;height:17px;fill:#fff;}
.nav-logo-text{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--navy);}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-cta{padding:8px 18px;background:var(--navy);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;transition:background 0.2s;text-decoration:none;}
.nav-cta:hover{background:var(--teal);}
.nav-link{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-light);transition:color 0.2s;text-decoration:none;}
.nav-link:hover{color:var(--navy);}

/* SEARCH BAR */
.search-bar{background:#fff;border-bottom:1px solid var(--border);padding:12px 32px;}
.search-bar-inner{display:flex;gap:10px;align-items:center;max-width:1400px;margin:0 auto;flex-wrap:wrap;}
.sb-field{display:flex;align-items:center;gap:8px;padding:8px 14px;border:1.5px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;transition:border 0.2s;min-width:140px;}
.sb-field:hover,.sb-field:focus-within{border-color:var(--teal);}
.sb-field svg{width:14px;height:14px;fill:var(--text-muted);flex-shrink:0;}
.sb-field input,.sb-field select{border:none;outline:none;font-family:'Jost',sans-serif;font-size:12px;color:var(--text);background:transparent;width:100%;min-width:0;}
.sb-field select{cursor:pointer;}
.sb-search{padding:9px 18px;background:var(--teal);border:none;border-radius:9px;color:#fff;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;gap:6px;transition:background 0.2s;}
.sb-search:hover{background:var(--navy);}
.sb-search svg{width:14px;height:14px;fill:#fff;}

/* ACTIVE FILTERS */
.active-filters{background:var(--cream);padding:8px 32px;border-bottom:1px solid var(--border);display:none;}
.active-filters-inner{display:flex;gap:8px;align-items:center;flex-wrap:wrap;max-width:1400px;margin:0 auto;}
.filter-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;background:#fff;border:1.5px solid var(--teal-pale2);border-radius:100px;font-size:11px;color:var(--teal);font-weight:600;}
.filter-chip button{background:none;border:none;color:var(--teal);line-height:1;font-size:14px;padding:0;margin:0;}

/* MAIN LAYOUT */
.page-layout{display:flex;height:calc(100vh - 64px - 54px - 40px);overflow:hidden;}
.results-panel{width:52%;flex-shrink:0;overflow-y:auto;padding:20px 24px;}
.map-panel{flex:1;position:sticky;top:0;height:100%;}
#map{width:100%;height:100%;}

/* RESULTS HEADER */
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.results-count{font-size:14px;color:var(--text-light);}
.results-count strong{color:var(--navy);font-weight:600;}
.view-toggle{display:flex;gap:4px;}
.view-btn{width:34px;height:34px;border:1.5px solid var(--border);border-radius:7px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;}
.view-btn.active,.view-btn:hover{border-color:var(--teal);background:var(--teal-pale);}
.view-btn svg{width:16px;height:16px;fill:var(--text-muted);}
.view-btn.active svg{fill:var(--teal);}
.sort-select{padding:7px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'Jost',sans-serif;font-size:11px;color:var(--text);background:#fff;outline:none;cursor:pointer;}

/* LISTING CARDS — LIST VIEW */
.listings-list{display:flex;flex-direction:column;gap:16px;}
.lcard{border-radius:14px;overflow:hidden;border:1px solid var(--border);background:#fff;transition:box-shadow 0.2s,transform 0.2s;text-decoration:none;color:inherit;display:flex;height:200px;}
.lcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.lcard-img{width:220px;flex-shrink:0;position:relative;overflow:hidden;}
.lcard-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
.lcard:hover .lcard-img img{transform:scale(1.05);}
.lcard-badges{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:5px;}
.badge-type{background:rgba(28,48,38,0.85);color:#fff;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:4px 9px;border-radius:6px;backdrop-filter:blur(4px);}
.badge-wifi{display:flex;align-items:center;gap:4px;border-radius:6px;padding:4px 9px;font-size:9px;font-weight:700;letter-spacing:0.06em;width:fit-content;}
.badge-wifi.fast{background:rgba(22,163,74,0.9);color:#fff;}
.badge-wifi.mid{background:rgba(245,158,11,0.9);color:#fff;}
.badge-wifi.slow{background:rgba(239,68,68,0.9);color:#fff;}
.lcard-body{padding:16px;flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.lcard-top .lcard-loc{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted);margin-bottom:5px;}
.lcard-top .lcard-loc svg{width:11px;height:11px;fill:var(--text-muted);}
.lcard-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--navy);line-height:1.2;margin-bottom:8px;}
.lcard-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:600;letter-spacing:0.04em;padding:3px 8px;border-radius:5px;background:var(--teal-pale);color:var(--teal);}
.tag.w{background:var(--accent-pale);color:#92400E;}
.lcard-bottom{display:flex;align-items:flex-end;justify-content:space-between;}
.lcard-price-week{font-size:18px;font-weight:600;color:var(--navy);}
.lcard-price-month{font-size:12px;color:var(--text-muted);margin-top:1px;}
.lcard-cta{padding:8px 16px;background:var(--teal);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;transition:background 0.2s;}
.lcard-cta:hover{background:var(--navy);}

/* GRID VIEW */
.listings-grid-view{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.gcard{border-radius:14px;overflow:hidden;border:1px solid var(--border);background:#fff;transition:box-shadow 0.2s,transform 0.2s;text-decoration:none;color:inherit;display:block;}
.gcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.gcard-img{position:relative;aspect-ratio:4/3;overflow:hidden;}
.gcard-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
.gcard:hover .gcard-img img{transform:scale(1.05);}
.gcard-badges{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:5px;}
.gcard-body{padding:14px;}
.gcard-loc{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted);margin-bottom:4px;}
.gcard-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--navy);line-height:1.25;margin-bottom:8px;}
.gcard-tags{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.gcard-price{display:flex;align-items:baseline;gap:5px;border-top:1px solid var(--border);padding-top:10px;}
.gcard-pw{font-size:16px;font-weight:600;color:var(--navy);}
.gcard-pp{font-size:11px;color:var(--text-muted);}
.gcard-pm{font-size:11px;color:var(--text-light);margin-left:auto;}

/* SIDEBAR FILTER (mobile) */
.filter-sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);background:#fff;overflow-y:auto;padding:20px 18px;}
.filter-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.filter-group{margin-bottom:20px;}
.filter-label{font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;}
.filter-options{display:flex;flex-direction:column;gap:7px;}
.filter-opt{display:flex;align-items:center;gap:9px;cursor:pointer;padding:6px 8px;border-radius:7px;transition:background 0.15s;}
.filter-opt:hover{background:var(--teal-pale);}
.filter-opt input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal);cursor:pointer;}
.filter-opt-label{font-size:12px;color:var(--text);flex:1;}
.filter-opt-count{font-size:11px;color:var(--text-muted);}
.range-row{display:flex;gap:8px;margin-top:8px;}
.range-input{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'Jost',sans-serif;font-size:12px;color:var(--text);outline:none;}
.range-input:focus{border-color:var(--teal);}
.range-sep{font-size:12px;color:var(--text-muted);align-self:center;}
input[type=range]{width:100%;accent-color:var(--teal);margin-top:8px;}
.range-vals{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:4px;}

/* NO RESULTS */
.no-results{text-align:center;padding:60px 20px;color:var(--text-muted);}
.no-results svg{width:48px;height:48px;fill:var(--border);margin:0 auto 16px;}

/* MAP POPUP */
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:var(--shadow-md)!important;border:1px solid var(--border)!important;padding:0!important;}
.leaflet-popup-content{margin:0!important;padding:0!important;}
.map-popup{padding:14px;min-width:200px;}
.map-popup-img{width:100%;height:100px;object-fit:cover;border-radius:8px 8px 0 0;display:block;}
.map-popup-title{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--navy);font-weight:400;margin-bottom:2px;}
.map-popup-loc{font-size:11px;color:var(--text-muted);margin-bottom:6px;}
.map-popup-price{font-size:14px;font-weight:600;color:var(--teal);}
.map-popup-link{display:block;margin-top:8px;padding:7px;background:var(--teal);border-radius:7px;color:#fff;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;text-align:center;text-decoration:none;}
.map-price-marker{background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;white-space:nowrap;border:none;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.map-price-marker.coliving{background:var(--teal);}

/* MOBILE */
.show-map-btn{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;padding:12px 24px;background:var(--navy);color:#fff;border:none;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;box-shadow:0 4px 20px rgba(28,48,38,0.3);gap:8px;align-items:center;}
.show-map-btn svg{width:14px;height:14px;fill:#fff;}

@media(max-width:900px){
  .nav{padding:0 20px;}
  .search-bar{padding:10px 20px;}
  .active-filters{padding:8px 20px;}
  .page-layout{height:auto;flex-direction:column;}
  .results-panel{width:100%;height:auto;padding:16px;}
  .map-panel{display:none;position:fixed;bottom:0;left:0;right:0;height:55vh;z-index:100;border-top:2px solid var(--border);}
  .map-panel.visible{display:block;}
  .show-map-btn{display:flex;}
  .listings-grid-view{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>

<!-- SEARCH BAR -->
<div class="search-bar">

    <div class="sb-field" style="flex:2;">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>

    <div class="sb-field">
      <svg viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>
      <select id="filterDuration">
        <option value="">Trajanje</option>
        <option value="weekly">Tjedni najam</option>
        <option value="monthly">Mjesečni najam</option>
      </select>

      <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>

<!-- ACTIVE FILTERS -->
<div class="active-filters" id="activeFilters">
  <div class="active-filters-inner" id="filterChips"></div>
</div>

<!-- PAGE LAYOUT -->
<div class="page-layout" id="pageLayout">
  <!-- RESULTS -->
  <div class="results-panel" id="resultsPanel">
    <div class="results-header">
      <div class="results-count" id="resultsCount">Učitavam…</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="default">Preporučeni</option>
          <option value="price_asc">Cijena: niža → viša</option>
          <option value="price_desc">Cijena: viša → niža</option>
          <option value="wifi_desc">WiFi: brži → sporiji</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn active" id="listViewBtn" onclick="setView('list')" title="Popis">
            <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
          </button>
          <button class="view-btn" id="gridViewBtn" onclick="setView('grid')" title="Mreža">
            <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3zm0 10h8v8H3zm10-10h8v8h-8zm0 10h8v8h-8z"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div id="listingsContainer"></div>
  </div>

  <!-- MAP -->
  <div class="map-panel" id="mapPanel">
    <div id="map"></div>
  </div>
</div>

<!-- MOBILE MAP TOGGLE -->
<button class="show-map-btn" id="showMapBtn" onclick="toggleMobileMap()">
  <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
  Prikaži kartu
</button>

<script>
const ALL_LISTINGS = [
  {id:1,title:'Studio s pogledom na more',loc:'Split',area:'Bačvice',type:'Studio',wifi:150,wifiLabel:'fast',weekPrice:280,monthPrice:950,lat:43.503,lng:16.440,tags:['Radni stol','Klima','Kat 3'],img:'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=800&q=80',coliving:false},
  {id:2,title:'Coliving Prostor — Soba 3',loc:'Dubrovnik',area:'Stari grad',type:'Coliving soba',wifi:200,wifiLabel:'fast',weekPrice:320,monthPrice:1100,lat:42.650,lng:18.094,tags:['Zajednička kuhinja','Terasa','4 sobe'],img:'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=800&q=80',coliving:true},
  {id:3,title:'Moderan apartman u centru',loc:'Zagreb',area:'Gornji grad',type:'Apartman',wifi:85,wifiLabel:'mid',weekPrice:240,monthPrice:780,lat:45.815,lng:15.980,tags:['Brzi lift','Coworking blizu'],img:'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=800&q=80',coliving:false},
  {id:4,title:'Mirna kuća uz more',loc:'Rovinj',area:'Stari grad',type:'Kuća',wifi:60,wifiLabel:'mid',weekPrice:410,monthPrice:1400,lat:45.081,lng:13.639,tags:['Vrt','Parking','Pet friendly'],img:'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800&q=80',coliving:false},
  {id:5,title:'Nomad Hub — Dvokrevetna soba',loc:'Split',area:'Meje',type:'Coliving soba',wifi:300,wifiLabel:'fast',weekPrice:190,monthPrice:680,lat:43.510,lng:16.418,tags:['Ergonomska stolica','Printer','Zajednički salon'],img:'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=800&q=80',coliving:true},
  {id:6,title:'Penthouse s terasom',loc:'Zadar',area:'Poluotok',type:'Penthouse',wifi:100,wifiLabel:'fast',weekPrice:550,monthPrice:1900,lat:44.119,lng:15.231,tags:['Bazen','Pogled na more','Jacuzzi'],img:'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800&q=80',coliving:false},
  {id:7,title:'Apartman blizu mora',loc:'Šibenik',area:'Centar',type:'Apartman',wifi:70,wifiLabel:'mid',weekPrice:200,monthPrice:680,lat:43.735,lng:15.895,tags:['Balkon','Klima'],img:'https://images.unsplash.com/photo-1484154218962-a197022b5858?w=800&q=80',coliving:false},
  {id:8,title:'Coliving Stari grad',loc:'Zagreb',area:'Stari grad',type:'Coliving soba',wifi:250,wifiLabel:'fast',weekPrice:220,monthPrice:780,lat:45.820,lng:15.970,tags:['Dnevni boravak','Kuhinja','5 soba'],img:'https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=800&q=80',coliving:true},
  {id:9,title:'Luksuzni studio — Hvar',loc:'Hvar',area:'Grad Hvar',type:'Studio',wifi:80,wifiLabel:'mid',weekPrice:380,monthPrice:1250,lat:43.172,lng:16.441,tags:['Pogled na luku','Terasa'],img:'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=800&q=80',coliving:false},
  {id:10,title:'Velika soba — Nomad Villa',loc:'Split',area:'Manuš',type:'Coliving soba',wifi:400,wifiLabel:'fast',weekPrice:250,monthPrice:890,lat:43.508,lng:16.447,tags:['Optički internet','Stojni stol','Monitor'],img:'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=800&q=80',coliving:true},
  {id:11,title:'Studio s terasom',loc:'Pula',area:'Centar',type:'Studio',wifi:90,wifiLabel:'mid',weekPrice:260,monthPrice:860,lat:44.867,lng:13.848,tags:['Terasa','Klima','Kuhinja'],img:'https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?w=800&q=80',coliving:false},
  {id:12,title:'Tihi apartman u Rovinju',loc:'Rovinj',area:'Zelena laguna',type:'Apartman',wifi:55,wifiLabel:'mid',weekPrice:290,monthPrice:980,lat:45.073,lng:13.631,tags:['Mirna lokacija','Bicikl'],img:'https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=800&q=80',coliving:false},
];

let currentView = 'list';
let mapInstance = null;
let mapMarkers = [];
let filtered = [...ALL_LISTINGS];

function wifiLabel(mbps){
  if(mbps>=100) return 'fast';
  if(mbps>=30) return 'mid';
  return 'slow';
}

function renderCard(l){
  if(currentView === 'list'){
    return `<a href="oglas.html?id=${l.id}" class="lcard">
      <div class="lcard-img">
        <img src="${l.img}" alt="${l.title}" loading="lazy">
        <div class="lcard-badges">
          <span class="badge-type">${l.type}</span>
          <span class="badge-wifi ${l.wifiLabel}">⚡ ${l.wifi} Mbps</span>
        </div>
      </div>
      <div class="lcard-body">
        <div class="lcard-top">
          <div class="lcard-loc"><svg viewBox="0 0 24 24" width="11" height="11"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>${l.loc}, ${l.area}</div>
          <div class="lcard-title">${l.title}</div>
          <div class="lcard-tags">${l.tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}${l.coliving?'<span class="tag w">Coliving</span>':''}</div>
        </div>
        <div class="lcard-bottom">
          <div>
            <div class="lcard-price-week">€${l.weekPrice}<span style="font-size:12px;font-weight:400;color:var(--text-muted);"> / tjedan</span></div>
            <div class="lcard-price-month">€${l.monthPrice} / mjesec</div>
          </div>
          <button class="lcard-cta">Pogledaj</button>
        </div>
      </div>
    </a>`;
  } else {
    return `<a href="oglas.html?id=${l.id}" class="gcard">
      <div class="gcard-img">
        <img src="${l.img}" alt="${l.title}" loading="lazy">
        <div class="gcard-badges">
          <span class="badge-type">${l.type}</span>
          <span class="badge-wifi ${l.wifiLabel}">⚡ ${l.wifi} Mbps</span>
        </div>
      </div>
      <div class="gcard-body">
        <div class="gcard-loc">${l.loc}, ${l.area}</div>
        <div class="gcard-title">${l.title}</div>
        <div class="gcard-tags">${l.tags.slice(0,2).map(t=>`<span class="tag">${t}</span>`).join('')}${l.coliving?'<span class="tag w">Coliving</span>':''}</div>
        <div class="gcard-price">
          <span class="gcard-pw">€${l.weekPrice}</span>
          <span class="gcard-pp">/ tjed.</span>
          <span class="gcard-pm">€${l.monthPrice} / mj.</span>
        </div>
      </div>
    </a>`;
  }
}

function applyFilters(){
  const loc = document.getElementById('filterLoc').value.trim().toLowerCase();
  const type = document.getElementById('filterType').value.toLowerCase();
  const wifi = parseInt(document.getElementById('filterWifi').value)||0;
  const maxPrice = parseInt(document.getElementById('filterMaxPrice').value)||999999;
  const duration = document.getElementById('filterDuration').value;
  const sort = document.getElementById('sortSelect').value;

  filtered = ALL_LISTINGS.filter(l => {
    if(loc && !l.loc.toLowerCase().includes(loc) && !l.area.toLowerCase().includes(loc)) return false;
    if(type && !l.type.toLowerCase().replace(/\s/g,'').includes(type.replace(/\s/g,''))) return false;
    if(l.wifi < wifi) return false;
    if(duration === 'weekly' && l.weekPrice > maxPrice) return false;
    if(duration === 'monthly' && l.monthPrice > maxPrice) return false;
    if(!duration && l.monthPrice > maxPrice) return false;
    return true;
  });

  if(sort === 'price_asc') filtered.sort((a,b)=>a.monthPrice - b.monthPrice);
  else if(sort === 'price_desc') filtered.sort((a,b)=>b.monthPrice - a.monthPrice);
  else if(sort === 'wifi_desc') filtered.sort((a,b)=>b.wifi - a.wifi);

  renderResults();
  updateChips(loc, type, wifi, maxPrice, duration);
  if(mapInstance) updateMapMarkers();
}

function renderResults(){
  const container = document.getElementById('listingsContainer');
  const count = document.getElementById('resultsCount');
  if(!filtered.length){
    container.innerHTML = `<div class="no-results"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><p style="font-size:15px;color:var(--text-light);">Nema oglasa za odabrane filtere</p><p style="font-size:12px;margin-top:4px;">Pokušajte smanjiti filtere</p></div>`;
    count.innerHTML = '<strong>0</strong> oglasa';
    return;
  }
  count.innerHTML = `<strong>${filtered.length}</strong> ${filtered.length===1?'oglas':filtered.length<5?'oglasa':'oglasa'}`;
  const wrapper = currentView==='list'?'listings-list':'listings-grid-view';
  container.innerHTML = `<div class="${wrapper}">${filtered.map(l=>renderCard(l)).join('')}</div>`;
}

function updateChips(loc, type, wifi, maxPrice, duration){
  const chips = [];
  if(loc) chips.push({label:`📍 ${loc}`, key:'loc'});
  if(type) chips.push({label:`🏠 ${type}`, key:'type'});
  if(wifi) chips.push({label:`⚡ ${wifi}+ Mbps`, key:'wifi'});
  if(maxPrice<999999) chips.push({label:`💶 max €${maxPrice}`, key:'maxPrice'});
  if(duration) chips.push({label:`📅 ${duration==='weekly'?'Tjedni':'Mjesečni'}`, key:'duration'});

  const af = document.getElementById('activeFilters');
  const fc = document.getElementById('filterChips');
  if(chips.length){
    af.style.display='block';
    fc.innerHTML = `<span style="font-size:11px;color:var(--text-muted);font-weight:600;">Filteri:</span>` +
      chips.map(c=>`<div class="filter-chip">${c.label}<button onclick="clearFilter('${c.key}')">×</button></div>`).join('') +
      `<button onclick="clearAllFilters()" style="font-size:11px;color:var(--teal);background:none;border:none;font-weight:600;cursor:pointer;padding:4px 8px;">Očisti sve</button>`;
  } else {
    af.style.display='none';
  }
}

function clearFilter(key){
  if(key==='loc') document.getElementById('filterLoc').value='';
  if(key==='type') document.getElementById('filterType').value='';
  if(key==='wifi') document.getElementById('filterWifi').value='';
  if(key==='maxPrice') document.getElementById('filterMaxPrice').value='';
  if(key==='duration') document.getElementById('filterDuration').value='';
  applyFilters();
}

function clearAllFilters(){
  document.getElementById('filterLoc').value='';
  document.getElementById('filterType').value='';
  document.getElementById('filterWifi').value='';
  document.getElementById('filterMaxPrice').value='';
  document.getElementById('filterDuration').value='';
  applyFilters();
}

function setView(v){
  currentView = v;
  document.getElementById('listViewBtn').classList.toggle('active', v==='list');
  document.getElementById('gridViewBtn').classList.toggle('active', v==='grid');
  renderResults();
}

function updateMapMarkers(){
  mapMarkers.forEach(m=>m.remove());
  mapMarkers = [];
  filtered.forEach(l => {
    const el = document.createElement('div');
    el.className = 'map-price-marker' + (l.coliving?' coliving':'');
    el.textContent = `€${l.weekPrice}`;
    const marker = L.marker([l.lat, l.lng], {
      icon: L.divIcon({className:'', html:el.outerHTML, iconSize:[70,28], iconAnchor:[35,14]})
    });
    marker.bindPopup(`
      <div class="map-popup">
        <img src="${l.img}" alt="${l.title}" class="map-popup-img">
        <div style="padding:10px 0 0;">
          <div class="map-popup-title">${l.title}</div>
          <div class="map-popup-loc">${l.loc}, ${l.area}</div>
          <div class="map-popup-price">€${l.weekPrice}/tjed · €${l.monthPrice}/mj.</div>
          <a href="oglas.html?id=${l.id}" class="map-popup-link">Pogledaj oglas</a>
        </div>
      </div>`, {maxWidth:240});
    marker.addTo(mapInstance);
    mapMarkers.push(marker);
  });
}

function toggleMobileMap(){
  const mp = document.getElementById('mapPanel');
  const btn = document.getElementById('showMapBtn');
  const showing = mp.classList.toggle('visible');
  btn.innerHTML = showing ?
    '<svg viewBox="0 0 24 24" width="14" height="14" style="fill:#fff;"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg> Zatvori kartu' :
    '<svg viewBox="0 0 24 24" width="14" height="14" style="fill:#fff;"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg> Prikaži kartu';
  if(showing && mapInstance) setTimeout(()=>mapInstance.invalidateSize(),200);
}

// URL PARAMS
const params = new URLSearchParams(location.search);
if(params.get('loc')) document.getElementById('filterLoc').value = params.get('loc');
if(params.get('type')) document.getElementById('filterType').value = params.get('type');
if(params.get('wifi')) document.getElementById('filterWifi').value = params.get('wifi');

applyFilters();

// INIT MAP
window.addEventListener('DOMContentLoaded', () => {
  if(typeof L === 'undefined'){
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    s.onload = initMap;
    document.head.appendChild(s);
  } else { initMap(); }
});

function initMap(){
  mapInstance = L.map('map', {zoomControl:true}).setView([44.5,16.5], 7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap contributors &copy; CARTO',
    maxZoom:19
  }).addTo(mapInstance);
  updateMapMarkers();
}

// Enter on search bar
document.getElementById('filterLoc').addEventListener('keydown', e => { if(e.key==='Enter') applyFilters(); });
</script>
</body>
</html>
